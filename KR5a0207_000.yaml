front:
  text: 五顯靈觀大帝燈儀
  hash: sha256:f7795d63111f0fcae1a3758f02c4bbf95db2a84332b7da5a25257aac069fa9b2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0207_HFL_000-001a, image: hfl/0083/0083-130.png}
body:
  text: 法事如式啓白焚香供養都天威猛大元帥顯聰昭應孚仁廣濟王橫天都部大元帥顯明昭烈孚義廣佑王通天金目大元帥顯正招順孚智廣惠王飛天風火大元帥顯直昭佑孚信廣澤王丹天降魔大元帥顯德昭利孚愛廣成王助靈史相公助順卞相公翊應周將軍王念二總管黃王二太尉令狐寺丞善慶童子土地真官直日功曹後宫仙源聖眷靈順法部侍從威靈悉運真香普同供養切以聰明為聖常顯跡於人間正直乃神屢彰名於世代啓五通之神殿決六蔽之昏衢天地風火水之間通達無礙仁義智信愛之聖惠澤旁施冀含識之回光遂知機而見曉欽慕昭昭之景宏演燈儀苟馳效效之誠旋垂鑑映凡於動靜皆賴護持遙瞻烜赫之容控露歸依之悃仰祈法駕俯鑒精衷今某猥處人倫遵承科教既沐覆全之德敢忘夤奉之恭敬選良辰肅陳淨供伏願銀缸煥爛門庭從此以光輝寶炷氤氲眷愛永諧於康泰臣衆等志心歸命都天威猛大元帥顯聰昭應孚仁廣濟王伏以聰明不諂賞罰不失於毫釐仁澤於民功過無分於纎芥上通天闕下入寒泉昭然賜福於塵區穆若護持於黎庶九州所重四海歸依作善者享福無邊積惡者貽災有自應如谷裏驗若形聲今某夙奉慈容常臻教典聊陳菲薦庸寓髮忱伏願神馭來臨密賜純禧之祐靈威降鑒益施長養之仁宗緒昌隆門庭清穆稽首皈依虔誠讃詠靈觀大帝神德尊神五通賢聖廣濟皇民救災禦患大布威靈願垂降鑒永錫康榮臣衆等志心歸命橫天都部大元帥顯明昭烈孚義廣佑王伏以明而不惑仰瞻穆穆之容赫爾崇髙佇想巍巍之德每推恩而及物常以善而化人慈悲普度於群生威力廣行於三界示作善降祥之美蠧為愆釀惡之因凡露禱祈必蒙感應今某禀生愚昧寄跡塵凡虔備香燈用延儀像伏願廓開昏翳光明散釋於災迍大布慈恩煙靄噴騰於和氣尊卑均慶頂踵沾恩稽首皈依虔誠讃詠顯明大聖昭烈威王賞善罰惡孚佑吾皇靈通貫斗氣蓋八方願垂景貺常啓福祥臣衆等志心歸命通天金目大元帥顯正昭順孚智廣惠王伏以正則不邪嘗施恩而育物禱而有應每惠澤以臨民竒謀祕計以為心撫恤寬容而闡事號令如法公平是依乃聖乃神賞罰無遺於咫尺或文或武盛衰有賴於提携今古攸遵吉凶昭顯今某志嚴圖像願欵神儀擬伸懇切之誠肅啓醮修之㑹伏願或商或賈皆成富積之家為仕為師早遂貴登之志門䦨清吉眷屬康寧稽首皈依虔誠讃詠顯正大聖昭順靈神智略才辨廣惠人民雨寶濟乏施德推仁勞籠群品鼓舞萬倫臣衆等志心歸命飛天風火大元帥顯直昭佑孚信廣澤王伏以直而不屈作前代之忠神信而不誣為今時之靈聖潤飾國土涵養黔黎威布三天功髙六合敬之如在自然禍滅福生禱之有通必得凶消吉至凡託帡幪之庇俱叨利濟之恩意啓一誠命延百福今某洗心滌慮修德省躬然燦爛之銀缸𤑔芬芳之寶篆仰瞻神馭昭格愚衷伏願在公在私時有亨嘉之慶守官守職日無言責之聞壽紀增隆身躬康泰稽首皈依虔誠讃詠顯直昭佑廣澤聖王施恩布德萬物祺祥何災不滅何福不昌願回景貺四序攸康臣衆等志心歸命丹天降魔大元帥顯德昭利孚愛廣成王伏以德素推於萬象利物愛民恩溥及於群生蠲災卻禍談笑兮神風靜默優游兮海宇澄清金殿玉堂隱映仙姿靈峙雕輪寶馬雍容慈貌神儀手執金磚足踏火輦每降祥而旌德或暴禍以彰威既闡神通合伸歸嚮今某叨居下土生在中華歲時永賴於陶成晝夜由資於洪覆輒伸蟻素仰答鴻休伏願鶴駕翩翩星軿翼翼自尊及幼常居寧謐之鄉內戚外親永履平康之運稽首皈依䖍誠讃詠顯德昭利孚愛廣成安民濟物素德推仁若有投懇修奉安寧虔誠奉請五福來并諷經向來回向五顯靈觀大帝燈儀終
